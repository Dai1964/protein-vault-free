<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏋️ Protein Vault — Nothing Stocked Here</title>
<style>
  :root{
    --ground-1:#141414;
    --ground-2:#1f1f1f;
    --panel:#242424;
    --panel-edge:#3a3a3a;
    --steel:#8a97a3;
    --accent:#ff5a1f;
    --accent-dim:#c94716;
    --text-light:#f2f0ec;
    --font-display:'Arial Black','Arial Narrow',Arial,sans-serif;
    --font-body:'Segoe UI',Verdana,Tahoma,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-body);
    color:var(--text-light);
    text-align:center;
    padding:1.5rem;
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,.02) 0 2px, transparent 2px 40px),
      linear-gradient(180deg,var(--ground-1),var(--ground-2));
  }
  .wrap{max-width:480px;}
  .plate{
    width:110px;height:110px;margin:0 auto 1.5rem;
  }
  h1{
    font-family:var(--font-display);
    text-transform:uppercase;letter-spacing:.04em;
    font-size:clamp(1.5rem,5vw,2.2rem);
    margin:0 0 .75rem;
    text-shadow:2px 2px 0 var(--accent-dim);
  }
  p{color:var(--steel);font-size:1rem;line-height:1.6;margin:0 0 2rem;}
  .btn{
    display:inline-flex;align-items:center;gap:.5rem;
    border:none;text-decoration:none;
    padding:.8rem 1.6rem;
    font-family:var(--font-display);
    text-transform:uppercase;letter-spacing:.04em;
    font-size:.9rem;
    color:#141414;
    background:var(--accent);
    clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
    transition:filter .1s ease;
  }
  .btn:hover{filter:brightness(1.15);}
</style>
</head>
<body>
  <div class="wrap">
    <svg class="plate" viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="92" fill="#2c2c2c" stroke="#4a4a4a" stroke-width="4"/>
      <circle cx="100" cy="100" r="92" fill="none" stroke="#ff5a1f" stroke-width="3" opacity=".55"/>
      <circle cx="100" cy="100" r="30" fill="#141414" stroke="#4a4a4a" stroke-width="3"/>
      <circle cx="100" cy="46" r="7" fill="#4a4a4a"/>
      <circle cx="100" cy="154" r="7" fill="#4a4a4a"/>
      <circle cx="46" cy="100" r="7" fill="#4a4a4a"/>
      <circle cx="154" cy="100" r="7" fill="#4a4a4a"/>
      <text x="100" y="112" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="900" fill="#f2f0ec">?</text>
    </svg>
    <h1>This Bay Isn't Stocked</h1>
    <p>Whatever you were looking for isn't on this shelf. Head back to the app and keep tracking your gains.</p>
    <a class="btn" href="/protein-vault-free/">Back to Protein Vault</a>
  </div>
</body>
</html>
